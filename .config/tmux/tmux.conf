set -g escape-time 10
set -g focus-events on
set -a terminal-features "tmux-254color:RGB"
set -g status-position top
set -g status-justify absolute-centre
set -g status-interval 5
set -g status-left ""
set -g status-right ""
set -g status-style "bg=default"
set -g window-style "fg=colour244"
set -g window-active-style "fg=#d4be98"
set -g renumber-windows on
set -g base-index 1
set -g window-status-current-style "bg=default,fg=colour6,bold,noreverse"
set -g window-status-style "bg=default,fg=colour244"
set -g window-status-separator "    "
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",tmux-256color:Tc"
set -g mouse on
setw -g mode-keys vi
set -g status-keys vi
set -g automatic-rename on
set -g automatic-rename-format "#{pane_current_command}:#{b:pane_current_path}"

unbind C-b
set -g prefix C-a
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"
bind g run "~/.config/scripts/open-github.sh"
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded tmux.conf"
bind C-a send-prefix
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R
bind -T copy-mode-vi v			send -X begin-selection
bind -T copy-mode-vi y			send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter		send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi M-c send -X copy-pipe-and-cancel "pbcopy"

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
